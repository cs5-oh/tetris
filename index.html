<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>테트리스</h1>
      <p class="subtitle">HTML · CSS · JavaScript 학습용 프로젝트</p>
    </header>

    <main class="game-layout">
      <section class="side-panel">
        <div class="panel-box">
          <h2>점수</h2>
          <p class="score-value" id="score">0</p>
          <p class="stat-label">삭제한 줄</p>
          <p class="stat-value" id="lines-cleared">0</p>
        </div>

        <div class="panel-box">
          <h2>조작법</h2>
          <ul class="controls-list">
            <li><kbd>←</kbd> ArrowLeft — 왼쪽 이동</li>
            <li><kbd>→</kbd> ArrowRight — 오른쪽 이동</li>
            <li><kbd>↓</kbd> ArrowDown — 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> ArrowUp — 회전</li>
            <li><kbd>Space</kbd> — 즉시 낙하 (hard drop)</li>
          </ul>
        </div>

        <div class="button-group">
          <button type="button" id="start-btn" class="btn btn-primary">시작</button>
          <button type="button" id="restart-btn" class="btn btn-secondary">재시작</button>
        </div>
      </section>

      <section class="board-section">
        <h2 class="visually-hidden">게임 보드</h2>
        <div id="board" class="board" aria-label="테트리스 게임 보드"></div>
        <p class="status-message" id="status-message">시작 버튼을 눌러 게임을 준비하세요.</p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
